spring.application.name=Covoiturage
# Activate dev profile (H2 database)
spring.profiles.active=dev
# Server
server.port=8081
# application.properties — full file
spring.datasource.url=jdbc:h2:mem:covoiturage;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Prevents lazy loading issues when serializing entities to JSON
spring.jackson.serialization.fail-on-empty-beans=false